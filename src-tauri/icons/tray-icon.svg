<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- 背景深色圆（让图标在任务栏中可见） -->
  <circle cx="32" cy="32" r="30" fill="rgba(30,30,35,0.85)"/>
  <circle cx="32" cy="32" r="30" stroke="rgba(80,80,90,0.3)" stroke-width="0.5" fill="none"/>

  <!-- 履带底盘 -->
  <rect x="14" y="46" width="36" height="8" rx="4" fill="#8B8D92"/>
  <line x1="19" y1="46" x2="19" y2="54" stroke="#6B6D72" stroke-width="1.2"/>
  <line x1="24" y1="46" x2="24" y2="54" stroke="#6B6D72" stroke-width="1.2"/>
  <line x1="29" y1="46" x2="29" y2="54" stroke="#6B6D72" stroke-width="1.2"/>
  <line x1="34" y1="46" x2="34" y2="54" stroke="#6B6D72" stroke-width="1.2"/>
  <line x1="39" y1="46" x2="39" y2="54" stroke="#6B6D72" stroke-width="1.2"/>
  <line x1="44" y1="46" x2="44" y2="54" stroke="#6B6D72" stroke-width="1.2"/>

  <!-- 车轮 -->
  <circle cx="18" cy="50" r="3" fill="#6B6D72"/>
  <circle cx="46" cy="50" r="3" fill="#6B6D72"/>

  <!-- 车身 -->
  <rect x="17" y="24" width="30" height="24" rx="4" fill="#E8EAED"/>
  <rect x="17" y="40" width="30" height="8" rx="0 0 4 4" fill="#D0D3D8"/>

  <!-- 散热格栅 -->
  <rect x="21" y="26" width="7" height="6" rx="1.5" fill="#D0D3D8"/>
  <line x1="23" y1="26" x2="23" y2="32" stroke="#B8BBBF" stroke-width="0.6"/>
  <line x1="25" y1="26" x2="25" y2="32" stroke="#B8BBBF" stroke-width="0.6"/>

  <!-- 红条 -->
  <rect x="17" y="37" width="30" height="2" fill="#DE2910" rx="1"/>

  <!-- 国旗 -->
  <rect x="33" y="26" width="10" height="6" rx="1" fill="#DE2910"/>
  <circle cx="35" cy="28" r="0.7" fill="#FFDE00"/>
  <circle cx="37" cy="27.5" r="0.4" fill="#FFDE00"/>
  <circle cx="37" cy="29" r="0.4" fill="#FFDE00"/>

  <!-- 太阳能板 - 左 -->
  <rect x="5" y="20" width="12" height="20" rx="2" fill="#2955A3"/>
  <line x1="11" y1="20" x2="11" y2="40" stroke="#1A3A6E" stroke-width="0.5"/>
  <line x1="5" y1="26" x2="17" y2="26" stroke="#1A3A6E" stroke-width="0.5"/>
  <line x1="5" y1="32" x2="17" y2="32" stroke="#1A3A6E" stroke-width="0.5"/>

  <!-- 太阳能板 - 右 -->
  <rect x="47" y="20" width="12" height="20" rx="2" fill="#2955A3"/>
  <line x1="53" y1="20" x2="53" y2="40" stroke="#1A3A6E" stroke-width="0.5"/>
  <line x1="47" y1="26" x2="59" y2="26" stroke="#1A3A6E" stroke-width="0.5"/>
  <line x1="47" y1="32" x2="59" y2="32" stroke="#1A3A6E" stroke-width="0.5"/>

  <!-- 桅杆 -->
  <rect x="29.5" y="12" width="5" height="14" rx="2" fill="#C4C7CC"/>

  <!-- 头部 -->
  <rect x="18" y="3" width="28" height="13" rx="5" fill="#E8EAED"/>
  <rect x="18" y="3" width="28" height="13" rx="5" stroke="#C4C7CC" stroke-width="0.5" fill="none"/>

  <!-- 左眼 -->
  <circle cx="27" cy="9" r="5" fill="#2C2C2E"/>
  <circle cx="27" cy="9" r="3.2" fill="#4A4A4C"/>
  <circle cx="25.5" cy="7.5" r="1.5" fill="rgba(102,126,234,0.7)"/>
  <circle cx="26" cy="8" r="0.6" fill="rgba(255,255,255,0.8)"/>

  <!-- 右眼 -->
  <circle cx="37" cy="9" r="5" fill="#2C2C2E"/>
  <circle cx="37" cy="9" r="3.2" fill="#4A4A4C"/>
  <circle cx="35.5" cy="7.5" r="1.5" fill="rgba(102,126,234,0.7)"/>
  <circle cx="36" cy="8" r="0.6" fill="rgba(255,255,255,0.8)"/>

  <!-- 天线 -->
  <line x1="43" y1="23" x2="46" y2="17" stroke="#C4C7CC" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="46" cy="16.5" r="1.2" fill="#DE2910"/>
</svg>
