<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="rgba(30,30,35,0.85)"/>
  <circle cx="32" cy="32" r="30" stroke="rgba(80,80,90,0.3)" stroke-width="0.5" fill="none"/>

  <!-- Body -->
  <ellipse cx="32" cy="51" rx="10" ry="9" fill="#D2AA50"/>
  <ellipse cx="32" cy="51" rx="5" ry="6" fill="#F0E6B4"/>

  <!-- Tail -->
  <path d="M 40 50 Q 46 44 50 38 Q 52 34 48 32" stroke="#C8AA64" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Ears (smaller, floppy) -->
  <ellipse cx="16" cy="24" rx="6" ry="11" fill="#B47828"/>
  <ellipse cx="16" cy="24" rx="4" ry="9" fill="#A06923"/>
  <ellipse cx="48" cy="24" rx="6" ry="11" fill="#B47828"/>
  <ellipse cx="48" cy="24" rx="4" ry="9" fill="#A06923"/>

  <!-- Head -->
  <ellipse cx="32" cy="28" rx="16" ry="15" fill="#D2AA50"/>
  <ellipse cx="32" cy="20" rx="6" ry="5" fill="#E1BE64"/>

  <!-- Eyes -->
  <ellipse cx="27" cy="26" rx="3" ry="3" fill="#1E1914"/>
  <ellipse cx="27" cy="26" rx="1.5" ry="1.5" fill="rgba(255,255,255,0.9)"/>
  <ellipse cx="37" cy="26" rx="3" ry="3" fill="#1E1914"/>
  <ellipse cx="37" cy="26" rx="1.5" ry="1.5" fill="rgba(255,255,255,0.9)"/>

  <!-- Nose (triangle) -->
  <polygon points="30,32 34,32 32,35" fill="#2D1E14"/>

  <!-- Smile -->
  <path d="M 28 36 Q 30 39 32 39 Q 34 39 36 36" stroke="#825F32" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Tongue -->
  <ellipse cx="32" cy="40" rx="1.5" ry="1.5" fill="#D296A0"/>
</svg>
